        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #d4af37; /* Elegant Gold */
            --text-main: #f4f4f4;
            --text-muted: #a0a0a0;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 3rem 1rem 2rem;
            background-color: #0a0a0a;
            border-bottom: 2px solid var(--primary-color);
        }

        header h1 {
            font-size: 3.5rem;
            letter-spacing: 2px;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .contact-info {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* Sticky, Scrollable Navbar */
        nav {
            background-color: #0a0a0a;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .filter-container {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-color) #333;
        }

        .filter-container::-webkit-scrollbar { height: 6px; }
        .filter-container::-webkit-scrollbar-track { background: #333; }
        .filter-container::-webkit-scrollbar-thumb { background-color: var(--primary-color); border-radius: 10px; }

        .filter-btn {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--primary-color);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--primary-color);
            color: #000;
            font-weight: bold;
        }

        main {
            padding: 2rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 60vh;
        }

        .category-section { margin-bottom: 3.5rem; }

        .category-title {
            font-size: 2rem;
            color: var(--primary-color);
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        .menu-item {
            background-color: var(--surface-color);
            padding: 1.2rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid var(--primary-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .menu-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .item-info { flex: 1; padding-right: 15px; }

        .item-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .item-price {
            font-size: 1.1rem;
            color: var(--primary-color);
            font-weight: bold;
            white-space: nowrap;
        }

        footer {
            text-align: center;
            padding: 2rem;
            background-color: #0a0a0a;
            color: var(--text-muted);
            border-top: 1px solid #333;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 2.5rem; }
            .category-title { font-size: 1.5rem; }
            .menu-item { flex-direction: column; align-items: flex-start; gap: 8px; }
        }
    </style>
</head>

        const filterContainer = document.getElementById('filters');
        const menuContainer = document.getElementById('menu-container');

        // Create Filter Navbar
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `filter-btn ${cat === 'All' ? 'active' : ''}`;
            btn.textContent = cat;
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // Scroll button into view for mobile users
                btn.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
                renderMenu(cat);
            };
            filterContainer.appendChild(btn);
        });

        // Render the Grid Menu
        function renderMenu(filterCategory) {
            menuContainer.innerHTML = '';
            
            // If "All", map through all categories avoiding the "All" string itself
            const catsToRender = filterCategory === 'All' 
                ? categories.filter(c => c !== 'All') 
                : [filterCategory];

            catsToRender.forEach(cat => {
                const items = menuData.filter(item => item.category === cat);
                if (items.length === 0) return;

                const section = document.createElement('div');
                section.className = 'category-section';

                const title = document.createElement('h2');
                title.className = 'category-title';
                title.textContent = cat;
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'menu-grid';

                items.forEach(item => {
                    const menuItem = document.createElement('div');
                    menuItem.className = 'menu-item';
                    menuItem.innerHTML = `
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                        </div>
                        <div class="item-price">${item.price}</div>
                    `;
                    grid.appendChild(menuItem);
                });

                section.appendChild(grid);
                menuContainer.appendChild(section);
            });
        }

        // Initialize display
        renderMenu('All');
